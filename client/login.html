<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Wellora Portal</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    #registerForm { display: none; }
    .error-msg { color: #ef4444; font-size: 0.85rem; margin-bottom: 15px; display: none; }
  </style>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-grid.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-utilities.min.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-header">
      <a href="index.html" class="login-logo">
        <i class="ph ph-heartbeat" style="font-size: 32px;"></i>
      </a>
      <h1 id="formTitle">Welcome Back</h1>
      <p id="formSubtitle">Enter your credentials to access your portal</p>
    </div>
    <!-- Login Form -->
    <form id="loginForm">
      <div class="error-msg" id="loginError"></div>
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="patient@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-login">
        Sign In <i class="ph ph-sign-in"></i>
      </button>
    </form>
    <!-- Register Form -->
    <form id="registerForm">
      <div class="error-msg" id="registerError"></div>
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="regEmail">Email Address</label>
        <input type="email" id="regEmail" class="form-control" placeholder="patient@example.com" required>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-login">
        Create Account <i class="ph ph-user-plus"></i>
      </button>
    </form>
    <div class="login-footer" id="toggleText">
      Don't have an account? <a href="#" id="toggleLink">Create one now</a>
    </div>
  </div>

  <script>
    const toggleLink = document.getElementById('toggleLink');
    let isLogin = true;

    document.addEventListener('click', function(e) {
      if(e.target && e.target.id == 'toggleLink'){
        e.preventDefault();
        isLogin = !isLogin;
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('registerError').style.display = 'none';
        if (isLogin) {
          document.getElementById('loginForm').style.display = 'block';
          document.getElementById('registerForm').style.display = 'none';
          document.getElementById('formTitle').textContent = 'Welcome Back';
          document.getElementById('formSubtitle').textContent = 'Enter your credentials to access your portal';
          document.getElementById('toggleText').innerHTML = 'Don\'t have an account? <a href="#" id="toggleLink">Create one now</a>';
        } else {
          document.getElementById('loginForm').style.display = 'none';
          document.getElementById('registerForm').style.display = 'block';
          document.getElementById('formTitle').textContent = 'Create Account';
          document.getElementById('formSubtitle').textContent = 'Join Wellora health tracking platform';
          document.getElementById('toggleText').innerHTML = 'Already have an account? <a href="#" id="toggleLink">Sign in here</a>';
        }
      }
    });

    const API_URL = 'http://localhost:5555/api/auth';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            email: document.getElementById('loginEmail').value, 
            password: document.getElementById('loginPassword').value 
          })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('wellora_token', data.token);
          localStorage.setItem('wellora_user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('loginError').textContent = data.error;
          document.getElementById('loginError').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('loginError').textContent = 'Server connection failed';
        document.getElementById('loginError').style.display = 'block';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            name: document.getElementById('regName').value, 
            email: document.getElementById('regEmail').value, 
            password: document.getElementById('regPassword').value 
          })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('wellora_token', data.token);
          localStorage.setItem('wellora_user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('registerError').textContent = data.error;
          document.getElementById('registerError').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('registerError').textContent = 'Server connection failed';
        document.getElementById('registerError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
